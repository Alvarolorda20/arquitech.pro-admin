services:
  backend-admin:
    build:
      context: ./backend-admin
      dockerfile: Dockerfile
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-https://admin.arquitech.pro}
      - ADMIN_APP_URL=${ADMIN_APP_URL:-https://admin.arquitech.pro}
      - GLOBAL_ADMIN_USER_IDS=${GLOBAL_ADMIN_USER_IDS}
      - GLOBAL_ADMIN_EMAILS=${GLOBAL_ADMIN_EMAILS}
      - GLOBAL_ADMIN_ALLOWED_ROLES=${GLOBAL_ADMIN_ALLOWED_ROLES:-global_admin,super_admin}
      - GLOBAL_ADMIN_METADATA_FLAGS=${GLOBAL_ADMIN_METADATA_FLAGS:-global_admin,is_global_admin}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.admin-backend.rule=Host(`${ADMIN_API_HOST:-api-admin.arquitech.pro}`)"
      - "traefik.http.routers.admin-backend.entrypoints=web,websecure"
      - "traefik.http.routers.admin-backend.tls=true"
      - "traefik.http.routers.admin-backend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.admin-backend.loadbalancer.server.port=8000"

  panel-admin:
    build:
      context: ./panel-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-admin.arquitech.pro}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-https://api-admin.arquitech.pro}
        NEXT_PUBLIC_WORKSPACE_APP_URL: ${NEXT_PUBLIC_WORKSPACE_APP_URL:-https://app.arquitech.pro}
        NEXT_PUBLIC_ADMIN_APP_URL: ${NEXT_PUBLIC_ADMIN_APP_URL:-https://admin.arquitech.pro}
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api-admin.arquitech.pro}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-https://api-admin.arquitech.pro}
      - NEXT_PUBLIC_ADMIN_APP_URL=${NEXT_PUBLIC_ADMIN_APP_URL:-https://admin.arquitech.pro}
      - NEXT_PUBLIC_WORKSPACE_APP_URL=${NEXT_PUBLIC_WORKSPACE_APP_URL:-https://app.arquitech.pro}
      - API_URL=${API_URL:-https://api-admin.arquitech.pro}
      - ADMIN_APP_URL=${ADMIN_APP_URL:-https://admin.arquitech.pro}
      - ADMIN_PANEL_HOST=${ADMIN_PANEL_HOST:-admin.arquitech.pro}
      - WORKSPACE_APP_URL=${WORKSPACE_APP_URL:-https://app.arquitech.pro}
      - WORKSPACE_APP_HOST=${WORKSPACE_APP_HOST:-app.arquitech.pro}
    depends_on:
      backend-admin:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.admin-frontend.rule=Host(`${ADMIN_PANEL_HOST:-admin.arquitech.pro}`)"
      - "traefik.http.routers.admin-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.admin-frontend.tls=true"
      - "traefik.http.routers.admin-frontend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.admin-frontend.loadbalancer.server.port=3000"

networks:
  n8n_default:
    external: true
